<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continued fraction expansion</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #ffffff;
      overflow-x: auto;
      overflow-y: auto;
    }

    body {
      font-family: "Times New Roman", serif;
    }

    #score {
      position: relative;
      display: block;
      min-height: 100vh;
      background: #ffffff;
    }

    .controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
    }

    .add-depth-button {
      min-width: 120px;
      height: 42px;
      border: 2px solid #111111;
      background: #ffffff;
      color: #111111;
      font-family: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 16px;
      text-transform: lowercase;
    }

    .add-depth-button:hover {
      background: #f4f4f4;
    }

    .stats-readout {
      margin-top: 12px;
      width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 2px solid #111111;
      background: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      line-height: 1.45;
    }

    .stats-readout-row + .stats-readout-row {
      margin-top: 10px;
    }

    .stats-readout-label {
      display: block;
      margin-bottom: 2px;
    }

    .stats-readout-value {
      display: block;
      font-family: "Courier New", monospace;
      white-space: pre;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    .stats-formula {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #111111;
      font-family: "Courier New", monospace;
      white-space: pre-wrap;
      font-variant-numeric: tabular-nums;
    }

    .module-box {
      position: absolute;
      display: grid;
      grid-template-rows: 54px 54px 40px;
      color: #111111;
      width: max-content;
      transition: left 320ms ease, top 320ms ease;
    }

    .module-row-top,
    .module-row-question,
    .module-row-square {
      display: flex;
      align-items: flex-start;
      white-space: nowrap;
    }

    .module-row-top {
      align-items: baseline;
      gap: 6px;
    }

    .module-row-question {
      padding-left: 20px;
    }

    .module-row-square {
      padding-left: 22px;
    }

    .fixed-root-row {
      position: absolute;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transition: left 320ms ease, top 320ms ease, width 320ms ease;
    }

    .tie-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bracket,
    .split-label,
    .breve,
    .question-mark,
    .square-label,
    .tie-inline {
      position: relative;
      color: #111111;
      flex: 0 0 auto;
    }

    .bracket {
      width: 14px;
      height: 26px;
      border-left: 2.2px solid #111111;
      border-top: 2.2px solid #111111;
      top: 3px;
    }

    .split-label {
      font-size: 44px;
      line-height: 1;
      white-space: nowrap;
    }

    .split-label sup,
    .square-label sup {
      position: relative;
      font-size: 0.45em;
      vertical-align: baseline;
      line-height: 1;
    }

    .split-label sup {
      top: -0.7em;
      margin-left: -0.12em;
      margin-right: 0.02em;
    }

    .split-label .colon {
      margin-left: 0.02em;
    }

    .breve {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      height: 46px;
      white-space: nowrap;
    }

    .breve-count {
      font-size: 44px;
      line-height: 1;
      white-space: nowrap;
    }

    .breve-note {
      position: relative;
      top: 4px;
      width: 53px;
      height: 30px;
    }

    .breve-head {
      position: absolute;
      left: 10px;
      top: 1px;
      width: 33px;
      height: 26px;
      border: 2.2px solid #111111;
      border-radius: 50%;
      background: #ffffff;
    }

    .breve-bar {
      position: absolute;
      top: 1px;
      width: 2.2px;
      height: 26px;
      background: #111111;
    }

    .breve-bar.left {
      left: 0;
    }

    .breve-bar.right {
      right: 0;
    }

    .question-mark {
      font-size: 60px;
      line-height: 1;
      white-space: nowrap;
    }

    .fixed-root-row .question-mark {
      visibility: hidden;
      width: 0;
    }

    .square-label {
      font-size: 28px;
      line-height: 1;
      white-space: nowrap;
    }

    .square-label sup {
      top: -0.62em;
      margin-left: -0.14em;
    }

    .tie {
      height: 12px;
      background: transparent;
      border-bottom: 2px solid #111111;
      border-radius: 0 0 999px 999px;
    }

    .tie-inline {
      width: 26px;
      height: 12px;
      top: 10px;
      border-bottom: 2px solid #111111;
      border-radius: 0 0 999px 999px;
    }

    .tie-connector {
      position: absolute;
      height: 12px;
      border-bottom: 2px solid #111111;
      border-radius: 0 0 999px 999px;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button class="add-depth-button" id="add-depth-button" type="button" aria-label="Add nesting">adding nest</button>
    <div class="stats-readout" id="stats-readout" aria-label="Current decimal approximation">
      <div class="stats-readout-row">
        <span class="stats-readout-label">approx:</span>
        <span class="stats-readout-value" id="approx-value"></span>
        <div class="stats-formula" id="stats-formula"></div>
      </div>
      <div class="stats-readout-row">
        <span class="stats-readout-label">sqrt(2):</span>
        <span class="stats-readout-value" id="truth-value"></span>
      </div>
      <div class="stats-readout-row">
        <span class="stats-readout-label">error:</span>
        <span class="stats-readout-value" id="error-value"></span>
      </div>
    </div>
  </div>

  <div
    id="score"
    role="img"
    aria-label="Nested continued fraction score"
  ></div>

  <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
  <script>
    const config = {
      radicand: 2,
      background: '#ffffff',
      ink: '#111111',
      tie: '#111111',
      topPaddingPx: 48,
      bottomPaddingPx: 40,
      leftPaddingPx: 28,
      rightPaddingPx: 76,
      rightAnchorInsetPx: 34,
      stepYPx: 54,
      stageHeightPaddingPx: 24,
      currentBoxLeftPx: 92,
      rootNoteLeftPx: 28,
      rowQuestionOffsetPx: 54,
      autoFollowDelayMs: 360,
      moduleOverlapPx: 56,
      minStepXPx: 150,
      bufferBelowViewportPx: 240,
      appendDepthChunk: 5,
      minimumVisibleRows: 6,
    };

    const score = document.getElementById('score');
    const addDepthButton = document.getElementById('add-depth-button');
    const approxValue = document.getElementById('approx-value');
    const truthValue = document.getElementById('truth-value');
    const errorValue = document.getElementById('error-value');
    const statsFormula = document.getElementById('stats-formula');

    Decimal.set({
      precision: 40,
      rounding: Decimal.ROUND_HALF_UP,
    });

    const state = {
      depth: 1,
      modules: [],
      partialTerms: [],
      continuedFraction: null,
      moduleElements: new Map(),
      rootRow: null,
      tieLayer: null,
      trueRadicalDecimal: new Decimal(config.radicand).sqrt(),
    };

    function createElement(tagName, className, styles = {}) {
      const element = document.createElement(tagName);

      if (className) {
        element.className = className;
      }

      Object.entries(styles).forEach(([key, value]) => {
        element.style[key] = value;
      });

      return element;
    }

    function estimateTextWidth(text, fontSize) {
      return text.length * fontSize * 0.56;
    }

    function getSplitLabelMetrics(denominator) {
      const baseText = String(denominator);
      const baseSize = 44;
      const exponentSize = 20;
      const colonSize = 44;
      const baseWidth = estimateTextWidth(baseText, baseSize);
      const exponentWidth = estimateTextWidth('2', exponentSize);
      const colonWidth = estimateTextWidth(':', colonSize);

      return {
        baseText,
        baseSize,
        exponentSize,
        colonSize,
        baseWidth,
        exponentWidth,
        colonWidth,
        totalWidth: baseWidth + exponentWidth * 0.5 + colonWidth,
      };
    }

    function createSplitLabel(denominator) {
      const metrics = getSplitLabelMetrics(denominator);

      const element = createElement('div', 'split-label');
      element.innerHTML = `${metrics.baseText}<sup>2</sup><span class="colon">:</span>`;
      return element;
    }

    function getSquareLabelMetrics(text) {
      const baseSize = 28;
      const exponentSize = 16;
      const exponentWidth = estimateTextWidth('2', exponentSize);
      return {
        baseSize,
        exponentSize,
        baseWidth: estimateTextWidth(text, baseSize),
        exponentWidth,
      };
    }

    function createSquareLabel(text) {
      const element = createElement('div', 'square-label');
      element.innerHTML = `${text}<sup>2</sup>`;
      return element;
    }

    function greatestCommonDivisor(left, right) {
      let a = Math.abs(left);
      let b = Math.abs(right);

      while (b !== 0) {
        const remainder = a % b;
        a = b;
        b = remainder;
      }

      return a || 1;
    }

    function simplifyFraction(numerator, denominator) {
      if (denominator < 0) {
        return simplifyFraction(-numerator, -denominator);
      }

      const divisor = greatestCommonDivisor(numerator, denominator);
      return {
        numerator: numerator / divisor,
        denominator: denominator / divisor,
      };
    }

    function addFractions(left, right) {
      return simplifyFraction(
        left.numerator * right.denominator + right.numerator * left.denominator,
        left.denominator * right.denominator,
      );
    }

    function reciprocalFraction(fraction) {
      return simplifyFraction(fraction.denominator, fraction.numerator);
    }

    function createSquareRootContinuedFraction(radicand) {
      const a0 = Math.floor(Math.sqrt(radicand));

      if (a0 * a0 === radicand) {
        throw new Error(`radicand ${radicand} is a perfect square`);
      }

      let m = 0;
      let d = 1;
      let a = a0;

      return {
        a0,
        nextTerm() {
          m = d * a - m;
          d = (radicand - m * m) / d;
          a = Math.floor((a0 + m) / d);
          return a;
        },
      };
    }

    function ensureTerms(requiredCount) {
      while (state.partialTerms.length < requiredCount) {
        state.partialTerms.push(state.continuedFraction.nextTerm());
      }
    }

    function buildNestedModules(depth) {
      ensureTerms(depth);

      const selectedTerms = state.partialTerms.slice(0, depth);
      const modules = [];
      let childValue = null;

      for (let index = selectedTerms.length - 1; index >= 0; index -= 1) {
        const integerTerm = selectedTerms[index];
        const denominatorExpression = childValue
          ? addFractions({ numerator: integerTerm, denominator: 1 }, childValue)
          : { numerator: integerTerm, denominator: 1 };
        const value = reciprocalFraction(denominatorExpression);

        modules.push({
          integerTerm,
          denominatorExpression,
          value,
          splitLabel: `${value.denominator}^2 :`,
          squareLabel: `(${value.numerator}/${value.denominator})^2`,
        });

        childValue = value;
      }

      return modules;
    }

    function formatFraction(fraction) {
      return `${fraction.numerator}/${fraction.denominator}`;
    }

    function fractionToDecimal(fraction) {
      return new Decimal(fraction.numerator).div(fraction.denominator);
    }

    function formatDecimal(decimalValue, places = 36) {
      return decimalValue.toDecimalPlaces(places).toFixed(places);
    }

    function getCurrentApproximation() {
      const outermostModule = state.modules[state.modules.length - 1];
      const approximation = addFractions({ numerator: 1, denominator: 1 }, outermostModule.value);
      const approximationDecimal = fractionToDecimal(approximation);
      const errorDecimal = approximationDecimal.sub(state.trueRadicalDecimal).abs();

      return {
        nestedFraction: outermostModule.value,
        approximation,
        approximationDecimal,
        errorDecimal,
      };
    }

    function renderDecimalReadout() {
      if (state.modules.length === 0) {
        return;
      }

      const currentApproximation = getCurrentApproximation();

      approxValue.textContent = formatDecimal(currentApproximation.approximationDecimal);
      truthValue.textContent = formatDecimal(state.trueRadicalDecimal);
      errorValue.textContent = formatDecimal(currentApproximation.errorDecimal);
      statsFormula.textContent = `1 + ${formatFraction(currentApproximation.nestedFraction)}
    = ${formatFraction(currentApproximation.approximation)}`;
    }

    function createBreveToken(integerTerm) {
      const noteMultiplier = integerTerm / 2;
      const countLabel = Number.isInteger(noteMultiplier)
        ? String(noteMultiplier)
        : `${integerTerm}/2`;
      const countWidth = estimateTextWidth(countLabel, 44);
      const wrapper = createElement('div', 'breve');
      const count = createElement('div', 'breve-count');
      count.textContent = countLabel;
      wrapper.appendChild(count);

      const note = createElement('div', 'breve-note');
      note.appendChild(createElement('div', 'breve-bar left'));
      note.appendChild(createElement('div', 'breve-head'));
      note.appendChild(createElement('div', 'breve-bar right'));
      wrapper.appendChild(note);

      return {
        element: wrapper,
        width: countWidth + 6 + 53,
      };
    }

    function createWholeNoteToken() {
      const wrapper = createElement('div', 'breve');
      const note = createElement('div', 'breve-note', {
        top: '8px',
      });
      note.appendChild(createElement('div', 'breve-bar left'));
      note.appendChild(createElement('div', 'breve-head'));
      note.appendChild(createElement('div', 'breve-bar right'));
      wrapper.appendChild(note);

      return {
        element: wrapper,
        width: 53,
      };
    }

    function getBreveMetrics(integerTerm) {
      const noteMultiplier = integerTerm / 2;
      const countLabel = Number.isInteger(noteMultiplier)
        ? String(noteMultiplier)
        : `${integerTerm}/2`;
      const countWidth = estimateTextWidth(countLabel, 44);

      return {
        countWidth,
        totalWidth: countWidth + 6 + 53,
      };
    }

    function getModuleMetrics(module) {
      const splitMetrics = getSplitLabelMetrics(module.value.denominator);
      const breveMetrics = getBreveMetrics(module.integerTerm);
      const questionWidth = estimateTextWidth('?', 60);
      const squareMetrics = getSquareLabelMetrics(`(${module.value.numerator}/${module.value.denominator})`);
      const squareWidth = squareMetrics.baseWidth + squareMetrics.exponentWidth * 0.45;
      const row1Width = 14 + 6 + splitMetrics.totalWidth + 6 + breveMetrics.totalWidth;
      const maxRightX = Math.max(row1Width, 20 + questionWidth, 22 + squareWidth);

      return {
        boxWidth: maxRightX,
        row1Width,
        breveRightX: 14 + 6 + splitMetrics.totalWidth + 6 + breveMetrics.totalWidth,
        questionLeftX: 20,
        maxRightX,
      };
    }

    function getModuleLayout() {
      const moduleMetrics = state.modules.map((module) => getModuleMetrics(module));
      const totalHeight = 54 + 54 + 40;
      const stageHeight = Math.max(
        window.innerHeight,
        totalHeight + config.topPaddingPx + config.bottomPaddingPx + config.stageHeightPaddingPx + (state.depth - 1) * config.stepYPx,
      );
      const currentTop = stageHeight - config.bottomPaddingPx - totalHeight;
      const positions = new Map();
      let previousLeft = config.currentBoxLeftPx;
      let previousWidth = moduleMetrics[state.depth - 1].boxWidth;

      for (let age = 0; age < state.depth; age += 1) {
        const moduleIndex = state.depth - 1 - age;
        if (age === 0) {
          positions.set(moduleIndex, {
            left: config.currentBoxLeftPx,
            top: currentTop,
          });
          continue;
        }

        const stepX = Math.max(previousWidth - config.moduleOverlapPx, config.minStepXPx);
        const left = previousLeft + stepX;
        const top = currentTop - age * config.stepYPx;
        positions.set(moduleIndex, { left, top });
        previousLeft = left;
        previousWidth = moduleMetrics[moduleIndex].boxWidth;
      }

      const maxRight = Math.max(
        ...moduleMetrics.map((metrics, index) => positions.get(index).left + metrics.boxWidth),
        window.innerWidth - config.rightPaddingPx,
      );

      return {
        stageHeight,
        currentTop,
        positions,
        moduleMetrics,
        stageWidth: maxRight + config.rightPaddingPx,
      };
    }

    function createModuleBox(module) {
      const group = createElement('div', 'module-box');

      const rowTop = createElement('div', 'module-row-top');
      rowTop.appendChild(createElement('div', 'bracket'));
      rowTop.appendChild(createSplitLabel(module.value.denominator));
      rowTop.appendChild(createBreveToken(module.integerTerm).element);
      group.appendChild(rowTop);

      const rowQuestion = createElement('div', 'module-row-question');
      const question = createElement('div', 'question-mark');
      question.textContent = '?';
      rowQuestion.appendChild(question);
      group.appendChild(rowQuestion);

      const rowSquare = createElement('div', 'module-row-square');
      rowSquare.appendChild(createSquareLabel(`(${module.value.numerator}/${module.value.denominator})`));
      group.appendChild(rowSquare);

      return group;
    }

    function syncRootRow(currentTop) {
      if (!state.rootRow) {
        const rootRow = createElement('div', 'fixed-root-row');
        const note = createWholeNoteToken();
        rootRow.appendChild(note.element);
        const tie = createElement('div', 'tie-inline');
        rootRow.appendChild(tie);
        state.rootRow = {
          element: rootRow,
          tie,
          noteWidth: note.width,
        };
        score.appendChild(rootRow);
      }

      const tieWidth = Math.max(26, config.currentBoxLeftPx + 20 - (config.rootNoteLeftPx + state.rootRow.noteWidth) - 8);

      state.rootRow.element.style.left = `${config.rootNoteLeftPx}px`;
      state.rootRow.element.style.top = `${currentTop + config.rowQuestionOffsetPx}px`;
      state.rootRow.tie.style.width = `${tieWidth}px`;
    }

    function ensureTieLayer() {
      if (state.tieLayer) {
        return;
      }

      state.tieLayer = createElement('div', 'tie-layer');
      score.appendChild(state.tieLayer);
    }

    function syncTieConnectors(layout) {
      ensureTieLayer();
      state.tieLayer.replaceChildren();

      for (let index = 0; index < state.depth - 1; index += 1) {
        const olderPosition = layout.positions.get(index);
        const newerPosition = layout.positions.get(index + 1);
        const olderMetrics = layout.moduleMetrics[index];
        const newerMetrics = layout.moduleMetrics[index + 1];
        const left = newerPosition.left + newerMetrics.breveRightX + 6;
        const right = olderPosition.left + olderMetrics.questionLeftX - 6;

        if (right <= left) {
          continue;
        }

        const tie = createElement('div', 'tie-connector', {
          left: `${left}px`,
          top: `${olderPosition.top + config.rowQuestionOffsetPx + 6}px`,
          width: `${right - left}px`,
        });
        state.tieLayer.appendChild(tie);
      }
    }

    function syncModules() {
      const layout = getModuleLayout();
      score.style.width = `${layout.stageWidth}px`;
      score.style.height = `${layout.stageHeight}px`;
      syncRootRow(layout.currentTop);

      for (const [moduleIndex, element] of state.moduleElements.entries()) {
        if (moduleIndex >= state.depth) {
          element.remove();
          state.moduleElements.delete(moduleIndex);
        }
      }

      for (let index = 0; index < state.depth; index += 1) {
        let box = state.moduleElements.get(index);

        if (!box) {
          box = createModuleBox(state.modules[index]);
          box.style.left = `${config.currentBoxLeftPx}px`;
          box.style.top = `${layout.currentTop}px`;
          score.appendChild(box);
          state.moduleElements.set(index, box);
          requestAnimationFrame(() => {
            const target = layout.positions.get(index);
            box.style.left = `${target.left}px`;
            box.style.top = `${target.top}px`;
          });
          continue;
        }

        const target = layout.positions.get(index);
        box.style.left = `${target.left}px`;
        box.style.top = `${target.top}px`;
      }

      syncTieConnectors(layout);
    }

    function renderScore() {
      state.modules = buildNestedModules(state.depth);

      if (state.modules.length === 0) {
        return;
      }
      syncModules();
      renderDecimalReadout();
    }

    function scrollToLatestState(behavior = 'auto') {
      const scroller = document.scrollingElement || document.documentElement;
      let targetTop = 0;

      if (state.rootRow && state.rootRow.element) {
        const rootRect = state.rootRow.element.getBoundingClientRect();
        const rootBottomInDocument = rootRect.bottom + window.scrollY;
        targetTop = Math.max(0, rootBottomInDocument - window.innerHeight + 12);
      } else {
        const scoreRect = score.getBoundingClientRect();
        const scoreBottomInDocument = scoreRect.bottom + window.scrollY;
        targetTop = Math.max(0, scoreBottomInDocument - window.innerHeight);
      }

      scroller.scrollTo({ top: targetTop, behavior });
      window.scrollTo({ top: targetTop, behavior });
      document.documentElement.scrollTop = targetTop;
      document.body.scrollTop = targetTop;
    }

    function scheduleAutoFollow() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          scrollToLatestState('auto');
          window.setTimeout(() => {
            scrollToLatestState('auto');
          }, config.autoFollowDelayMs);
        });
      });
    }

    function ensureDepth(targetDepth) {
      if (state.depth >= targetDepth) {
        return;
      }

      state.depth = targetDepth;
    }

    function minimumDepthForViewport() {
      return Math.max(
        config.minimumVisibleRows,
        Math.ceil((window.innerHeight + config.bufferBelowViewportPx) / config.stepYPx),
      );
    }

    function advanceDepth() {
      ensureDepth(state.depth + 1);
      renderScore();
      scheduleAutoFollow();
    }

    function initialize() {
      state.continuedFraction = createSquareRootContinuedFraction(config.radicand);
      renderScore();
      scheduleAutoFollow();

      addDepthButton.addEventListener('click', advanceDepth);
      window.addEventListener('resize', () => {
        renderScore();
      }, { passive: true });
    }

    initialize();
  </script>
</body>
</html>
